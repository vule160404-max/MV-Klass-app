# Cho phép gọi Edge Function từ trang Netlify (preflight OPTIONS không bị chặn trước khi vào Deno).
# https://supabase.com/docs/guides/functions/function-configuration

[auth]
site_url = "https://mv-klass-app.vercel.app/app"
additional_redirect_urls = [
  "https://mv-klass-app.vercel.app/app",
  "https://mv-klass-app.vercel.app/**",
  "https://mv-klass-app-vule160404-4187s-projects.vercel.app/**",
  "https://mv-klass-app-git-main-vule160404-4187s-projects.vercel.app/**",
  "https://mv-klass-*-vule160404-4187s-projects.vercel.app/**",
  "http://localhost:3000/**",
  "http://127.0.0.1:3000/**"
]

[auth.email]
enable_confirmations = true
max_frequency = "1m0s"
otp_length = 8
otp_expiry = 3600

[auth.email.template.confirmation]
subject = "Xác minh tài khoản MV Klass"
content_path = "./supabase/templates/confirmation.html"

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[functions.parent-payment]
verify_jwt = false

[functions.bank-webhook]
verify_jwt = false

[functions.portal-premium-checkout]
verify_jwt = false

[functions.exam-download-url]
verify_jwt = false

[functions.exam-sync-r2]
verify_jwt = false

[functions.exam-r2-upload-url]
verify_jwt = false

[functions.exam-admin-files]
verify_jwt = false
