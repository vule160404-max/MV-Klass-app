<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <meta name="theme-color" content="#0f1f3d" />
  <link rel="icon" type="image/png" href="./assets/brand/Center-logo.png" />
  <title>Dang mo MV Klass</title>
  <script>
    (function () {
      const LOGIN_ONLY_KEY = 'mvk-login-only';
      const TWO_YEARS = 60 * 60 * 24 * 730;

      try {
        localStorage.setItem(LOGIN_ONLY_KEY, '1');
      } catch (e) {}

      try {
        const secure = window.location.protocol === 'https:' ? '; Secure' : '';
        document.cookie = LOGIN_ONLY_KEY + '=1; Path=/; Max-Age=' + TWO_YEARS + '; SameSite=Lax' + secure;
      } catch (e) {}

      window.location.replace('./attendance-app.html');
    })();
  </script>
</head>
<body>
  <p>Dang mo trang dang nhap MV Klass... <a href="./attendance-app.html">Bam vao day neu khong tu chuyen</a>.</p>
</body>
</html>
