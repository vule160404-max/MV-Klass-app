  <style>
    :root {

    .hero {

      align-items:flex-start;

    .hero-main {

    .hero-text { min-width:0; flex:1; }
    .hero-text h1 {

    .student-cards {

      gap:10px;

    .student-card {
      border:1px solid #cfddf7;

    .student-card-actions button {

      padding:12px 16px;
      font-size:15px;
    }
    .student-name {
      font-size:15px;
      font-weight:800;

    }
    .student-meta {

      flex-wrap:wrap;

    .student-pill {

      border:1px solid #d4e1fb;

    .student-note {
      margin-top:10px;

      line-height:1.45;
      font-weight:700;

    .grid { display:grid; gap:12px; grid-template-columns: 1fr; margin-top:12px; }
    @media (min-width: 860px) { .grid { grid-template-columns: 1.2fr .8fr; } }
    .box {
      border:1px solid var(--line);
      border-radius:14px;

    .stats { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:8px; }
    .stats .item { border:1px solid var(--line); border-radius:10px; padding:9px; background:#f9fbff; }
    .stats .k { font-size:12px; color:var(--muted); }
    .stats .v { font-size:16px; font-weight:800; margin-top:4px; color:#10284a; }
    .big-amount {
      border:1px dashed #9fb8ef;
      border-radius:10px;
      background:#f1f6ff;
      padding:11px;
      margin-top:10px;

    .ck { margin-top:8px; border:1px dashed #9eb3d8; border-radius:10px; background:#f8fbff; padding:11px; font-family:inherit; font-size:14px; word-break:break-word; }
    .qr {
      width:100%;
      max-width:280px;
      display:block;
      margin:0 auto;
      border-radius:14px;
      border:1px solid var(--line);
      background:#fff;
      box-shadow:0 10px 24px rgba(16,40,84,.12);
    }
    .class-list { display:grid; gap:8px; margin-top:10px; }
    .class-item {
      border:1px solid var(--line);
      border-radius:12px;

    .class-item:hover{
      border-color:#b8ccf8;
      box-shadow:0 8px 18px rgba(47,108,245,.12);
    }
    .class-item:active{ transform:translateY(1px); }
    .class-item.active {
      border-color:#2f6cf5;
      background:linear-gradient(180deg,#eef4ff 0%,#e7f0ff 100%);

    .class-item .sum { margin-top:5px; font-weight:800; color:#1e4fb5; }
    .footer-note { margin-top:12px; font-size:12px; color:#6a7891; text-align:center; }

    /* Trang thanh toÃ¡n thÃ nh cÃ´ng â€” cáº£nh ká»· niá»‡m + confetti + tÃ­ch SVG */
    .wrap .card.pp-card--success {
      padding: 0;
      overflow: hidden;
      background: linear-gradient(165deg, #ecfdf5 0%, #d1fae5 36%, #86efac 100%);
      border-color: #6ee7b7;
      box-shadow: 0 24px 56px rgba(16, 185, 129, 0.22);
    }
    .wrap .card.pp-card--success .hero,
    .wrap .card.pp-card--success .footer-note {
      display: none !important;
    }
    .wrap .card.pp-card--success #app {
      min-height: min(82vh, 680px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px 32px;
    }
    .pp-success-scene {
      position: relative;
      width: 100%;
      max-width: 440px;
      margin: 0 auto;
      text-align: center;
    }
    .pp-success-fx {
      position: absolute;
      inset: -12% -8% auto;
      height: min(52vh, 420px);
      pointer-events: none;
      overflow: visible;
      z-index: 0;
    }
    .pp-fw-burst {
      position: absolute;
      left: 50%;
      top: 38%;
      width: 12px;
      height: 12px;
      margin: -6px 0 0 -6px;
      border-radius: 50%;
      background: #fff;
      box-shadow:
        0 -56px 0 -2px #fbbf24,
        40px -40px 0 -1px #22c55e,
        -40px -40px 0 -1px #38bdf8,
        56px 0 0 -2px #a855f7,
        -56px 0 0 -2px #f472b6,
        40px 40px 0 -1px #eab308,
        -40px 40px 0 -1px #14b8a6,
        0 56px 0 -2px #fb923c;
      animation: pp-fw-pop 0.85s cubic-bezier(0.2, 0.9, 0.25, 1) 0.12s both;
    }
    .pp-fw-burst::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 140px;
      height: 140px;
      margin: -70px 0 0 -70px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.55) 0%, transparent 68%);
      animation: pp-fw-ring 1.1s ease-out 0.05s both;
    }
    @keyframes pp-fw-pop {
      from { transform: scale(0); opacity: 0; filter: blur(4px); }
      50% { opacity: 1; }
      to { transform: scale(1); opacity: 1; filter: blur(0); }
    }
    @keyframes pp-fw-ring {
      from { transform: scale(0.35); opacity: 0.95; }
      to { transform: scale(2.15); opacity: 0; }
    }
    .pp-fw-burst.pp-fw-burst--2 {
      top: 52%;
      animation: pp-fw-pop-2 0.88s cubic-bezier(0.2, 0.9, 0.25, 1) 0.32s both;
    }
    .pp-fw-burst.pp-fw-burst--2::after {
      animation-delay: 0.28s;
    }
    @keyframes pp-fw-pop-2 {
      0% { transform: scale(0); opacity: 0; filter: blur(3px); }
      40% { opacity: 1; filter: blur(0); }
      100% { transform: scale(1.08); opacity: 0.95; filter: blur(0); }
    }
    .pp-confetti-root {
      position: absolute;
      inset: 0;
      overflow: hidden;
      border-radius: 0;
    }
    .pp-cf {
      position: absolute;
      top: -16px;
      width: 9px;
      height: 14px;
      border-radius: 2px;
      opacity: 0.95;
      animation: pp-cf-fall linear forwards;
      will-change: transform, opacity;
    }
    @keyframes pp-cf-fall {
      0% {
        transform: translate3d(0, 0, 0) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translate3d(var(--drift, 0px), min(110vh, 620px), 0) rotate(640deg);
        opacity: 0.88;
      }
    }
    .pp-success-inner {
      position: relative;
      z-index: 1;
      padding: 8px 6px 4px;
      animation: pp-success-in 0.6s cubic-bezier(0.2, 0.85, 0.25, 1) both;
    }
    @keyframes pp-success-in {
      from { opacity: 0; transform: translateY(22px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .pp-success-eyebrow {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #059669;
      margin: 0 0 10px;
      opacity: 0.92;
      animation: pp-fade-up 0.5s ease 0.15s both;
    }
    @keyframes pp-fade-up {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .pp-success-icon-stage {
      position: relative;
      width: 108px;
      height: 108px;
      margin: 0 auto 22px;
    }
    .pp-success-icon-glow {
      position: absolute;
      inset: -18%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(34, 197, 94, 0.45) 0%, transparent 70%);
      animation: pp-glow-pulse 2.2s ease-in-out 0.4s infinite;
    }
    @keyframes pp-glow-pulse {
      0%, 100% { transform: scale(0.92); opacity: 0.75; }
      50% { transform: scale(1.06); opacity: 1; }
    }
    .pp-success-icon-wrap {
      position: relative;
      width: 108px;
      height: 108px;
      border-radius: 50%;
      background: linear-gradient(155deg, #4ade80 0%, #16a34a 48%, #15803d 100%);
      box-shadow:
        0 4px 0 rgba(21, 128, 61, 0.35),
        0 22px 48px rgba(22, 163, 74, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pp-check-pop 0.72s cubic-bezier(0.34, 1.55, 0.52, 1) 0.06s both;
    }
    @keyframes pp-check-pop {
      from { transform: scale(0) rotate(-18deg); }
      to { transform: scale(1) rotate(0deg); }
    }
    .pp-check-svg {
      display: block;
      color: #fff;
      filter: drop-shadow(0 2px 3px rgba(0, 0, 0, 0.12));
    }
    .pp-check-svg .pp-check-circle {
      fill: none;
      stroke: currentColor;
      stroke-width: 2.5;
      stroke-dasharray: 155;
      stroke-dashoffset: 155;
      animation: pp-stroke-draw 0.55s cubic-bezier(0.45, 0, 0.2, 1) 0.2s forwards;
    }
    .pp-check-svg .pp-check-path {
      fill: none;
      stroke: currentColor;
      stroke-width: 4.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 48;
      stroke-dashoffset: 48;
      animation: pp-stroke-draw 0.45s cubic-bezier(0.45, 0, 0.2, 1) 0.55s forwards;
    }
    @keyframes pp-stroke-draw {
      to { stroke-dashoffset: 0; }
    }
    .pp-success-title {
      font-size: clamp(24px, 5.5vw, 30px);
      font-weight: 800;
      color: #064e3b;
      margin: 0 0 12px;
      letter-spacing: -0.035em;
      line-height: 1.15;
      animation: pp-fade-up 0.55s ease 0.22s both;
    }
    .pp-success-msg {
      font-size: 15px;
      color: #047857;
      font-weight: 700;
      margin: 0 0 12px;
      line-height: 1.55;
      animation: pp-fade-up 0.55s ease 0.3s both;
    }
    .pp-success-thanks {
      font-size: 14px;
      color: #0f766e;
      margin: 0 0 24px;
      line-height: 1.6;
      font-weight: 600;
      max-width: 34em;
      margin-left: auto;
      margin-right: auto;
      animation: pp-fade-up 0.55s ease 0.38s both;
    }
    .pp-success-badge {
      display: inline-block;
      font-size: 12px;
      font-weight: 800;
      color: #1d4ed8;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(147, 197, 253, 0.85);
      padding: 8px 18px;
      border-radius: 999px;
      letter-spacing: 0.02em;
      box-shadow: 0 6px 20px rgba(37, 99, 235, 0.12);
      animation: pp-fade-up 0.55s ease 0.44s both;
    }
    @media (prefers-reduced-motion: reduce) {
      .pp-fw-burst,
      .pp-fw-burst.pp-fw-burst--2,
      .pp-fw-burst::after,
      .pp-success-icon-glow,
      .pp-cf,
      .pp-success-inner,
      .pp-success-eyebrow,
      .pp-success-title,
      .pp-success-msg,
      .pp-success-thanks,
      .pp-success-badge,
      .pp-check-svg .pp-check-circle,
      .pp-check-svg .pp-check-path,
      .pp-success-icon-wrap {
        animation: none !important;
      }
      .pp-fw-burst { opacity: 0.85; transform: scale(1); }
      .pp-check-svg .pp-check-circle,
      .pp-check-svg .pp-check-path { stroke-dashoffset: 0; }
      .pp-confetti-root { display: none; }
    }

    /* Toast (thay cho alert khi kiá»ƒm tra giao dá»‹ch / copy) */
    .pp-toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translate3d(-50%, 120%, 0);
      max-width: min(440px, calc(100vw - 28px));
      padding: 14px 18px;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 600;
      line-height: 1.45;
      text-align: center;
      box-shadow: 0 14px 44px rgba(22, 48, 110, 0.22);
      z-index: 10000;
      visibility: hidden;
      opacity: 0;
      transition: transform 0.38s cubic-bezier(0.2, 0.85, 0.25, 1), opacity 0.28s ease, visibility 0.28s;
      pointer-events: none;
    }
    .pp-toast.pp-toast--show {
      visibility: visible;
      opacity: 1;
      transform: translate3d(-50%, 0, 0);
      pointer-events: auto;
    }
    .pp-toast--ok {
      background: linear-gradient(180deg, #ecfdf5, #d1fae5);
      color: #065f46;
      border: 1px solid #6ee7b7;
    }
    .pp-toast--info {
      background: linear-gradient(180deg, #eff6ff, #dbeafe);
      color: #1e3a8a;
      border: 1px solid #93c5fd;
    }
    .pp-toast--err {
      background: linear-gradient(180deg, #fef2f2, #fee2e2);
      color: #991b1b;
      border: 1px solid #fca5a5;
    }
  </style>
</head>

        clearTimeout(tid);

      let j = null;

      if (!r.ok || !j || !j.ok) {

        if (!reason && !r.ok) {
